<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameTopUp — Магазин игровых товаров</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #141b2d;
            --accent: #00FFC8;
            --accent-hover: #00d4a7;
            --text-main: #ffffff;
            --text-muted: #7e8b9b;
            --price-old: #ef4444;
            --input-bg: #1f2a45;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 60px;
        }

        /* Хедер */
        header {
            background-color: var(--card-bg);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 255, 200, 0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--accent);
        }

        .header-links {
            margin-top: 8px;
            font-size: 13px;
        }

        .header-links a {
            color: var(--accent);
            text-decoration: none;
            margin: 0 10px;
        }

        /* Контейнер */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
        }

        /* Переключатель Игр (Вкладки) */
        .game-tabs {
            display: flex;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .game-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            color: var(--text-muted);
        }

        .game-tab.active {
            background-color: var(--accent);
            color: #000000;
        }

        /* Переключатель Категорий */
        .category-tabs {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            margin-bottom: 15px;
            padding-bottom: 5px;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            padding: 8px 16px;
            background-color: var(--card-bg);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .category-tab.active {
            border-color: var(--accent);
            color: var(--accent);
            background-color: rgba(0, 255, 200, 0.05);
        }

        /* Форма UID */
        .uid-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .uid-container label {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .uid-input {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            outline: none;
        }

        .uid-input:focus {
            border-color: var(--accent);
        }

        /* Сетка товаров */
        .products-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .product-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .product-card.selected {
            border-color: var(--accent);
            background-color: rgba(0, 255, 200, 0.02);
        }

        .product-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .product-title {
            font-size: 15px;
            font-weight: 600;
        }

        .product-prices {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .price-current {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
        }

        .price-old {
            font-size: 13px;
            color: var(--price-old);
            text-decoration: line-through;
        }

        .radio-circle {
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-card.selected .radio-circle {
            border-color: var(--accent);
        }

        .product-card.selected .radio-circle::after {
            content: '';
            width: 10px;
            height: 10px;
            background-color: var(--accent);
            border-radius: 50%;
        }

        /* Кнопка действия */
        .action-btn {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 30px);
            max-width: 570px;
            background-color: var(--accent);
            color: #000000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 255, 200, 0.3);
            text-align: center;
            z-index: 90;
        }

        .action-btn:active {
            background-color: var(--accent-hover);
        }

        /* Футер */
        footer {
            background-color: var(--card-bg);
            padding: 20px 15px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 40px;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .admin-trigger {
            margin-top: 15px;
            display: inline-block;
            color: rgba(255,255,255,0.2);
            text-decoration: underline;
            cursor: pointer;
            font-size: 11px;
        }

        /* Админ панель модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px 15px;
        }

        .modal-content {
            background-color: var(--card-bg);
            max-width: 500px;
            margin: 0 auto;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--accent);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .modal-close {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .admin-item-row {
            background-color: rgba(255,255,255,0.02);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .admin-item-title {
            font-size: 13px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .admin-inputs {
            display: flex;
            gap: 10px;
        }

        .admin-input-group {
            flex: 1;
        }

        .admin-input-group label {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .admin-field {
            width: 100%;
            padding: 8px;
            background-color: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 5px;
            color: #fff;
            font-size: 14px;
        }

        .admin-save-btn {
            width: 100%;
            background-color: var(--accent);
            color: #000;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">Game<span>TopUp</span></a>
        <div class="header-links">
            <a href="https://t.me/GameTopUp11" target="_blank">📢 Канал</a>
            <a href="https://t.me/GameTopUp11_bot" target="_blank">🤖 Бот</a>
        </div>
    </header>

    <div class="container">
        <div class="game-tabs">
            <div class="game-tab active" onclick="switchGame('ff')">Free Fire</div>
            <div class="game-tab" onclick="switchGame('pubg')">PUBG Mobile</div>
        </div>

        <div class="uid-container">
            <label id="id-label" for="uid">Введите Ваш UID:</label>
            <input type="text" id="uid" class="uid-input" placeholder="Например: 123456789">
        </div>

        <div id="categories-container" class="category-tabs">
            </div>

        <div id="products-container" class="products-grid">
            </div>
    </div>

    <button class="action-btn" onclick="processOrder()">Купить сейчас</button>

    <footer>
        <p>&copy; 2026 <b>GameTopUp</b>. Все права защищены.</p>
        <p style="margin-top: 5px;">Наш Telegram: <a href="https://t.me/GameTopUp11" target="_blank">@GameTopUp11</a> | Бот техподдержки: <a href="https://t.me/GameTopUp11_bot" target="_blank">@GameTopUp11_bot</a></p>
        <span class="admin-trigger" onclick="openAdmin()">Админ-панель</span>
    </footer>

    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Управление ценами GameTopUp</h3>
                <span class="modal-close" onclick="closeAdmin()">&times;</span>
            </div>
            <div id="admin-items-list">
                </div>
            <button class="admin-save-btn" onclick="saveAdminPrices()">Сохранить изменения</button>
        </div>
    </div>

    <script>
        // Начальная база данных товаров (дефолтные настройки)
        const defaultProducts = {
            ff: {
                diamonds: [
                    { id: "ff_d1", name: "100 + 10 алмазов 💎", price: 70, oldPrice: 109 },
                    { id: "ff_d2", name: "310 + 31 алмазов 🔥 Хит", price: 227, oldPrice: 349 },
                    { id: "ff_d3", name: "520 + 52 алмазов 💎", price: 367, oldPrice: 599 },
                    { id: "ff_d4", name: "1060 + 106 алмазов 💎", price: 739, oldPrice: 1188 },
                    { id: "ff_d5", name: "2180 + 218 алмазов 💎", price: 1479, oldPrice: 2398 },
                    { id: "ff_d6", name: "5600 + 560 алмазов 💎", price: 3549, oldPrice: 6999 }
                ],
                vouchers: [
                    { id: "ff_v1", name: "Недельный ваучер Лайт 📩", price: 32, oldPrice: 53 },
                    { id: "ff_v2", name: "Ваучер на неделю 🎟️", price: 148, oldPrice: 209 },
                    { id: "ff_v3", name: "Ваучер на месяц 🎫", price: 539, oldPrice: 799 }
                ]
            },
            pubg: {
                uc: [
                    { id: "pubg_u1", name: "60 UC 🪙", price: 80, oldPrice: 99 },
                    { id: "pubg_u2", name: "300 + 25 UC 🪙", price: 394, oldPrice: 525 },
                    { id: "pubg_u3", name: "600 + 60 UC 🪙", price: 849, oldPrice: 1099 },
                    { id: "pubg_u4", name: "1500 + 300 UC 🪙", price: 2119, oldPrice: 2699 },
                    { id: "pubg_u5", name: "3000 + 850 UC 🪙", price: 4239, oldPrice: 5199 },
                    { id: "pubg_u6", name: "6000 + 2100 UC 🪙", price: 8469, oldPrice: 11099 }
                ],
                passes: [
                    { id: "pubg_p1", name: "Elite Pass LVL 1-100 👑", price: 969, oldPrice: 0 },
                    { id: "pubg_p2", name: "Elite Pass Plus LVL 1-100 ➕", price: 2409, oldPrice: 0 },
                    { id: "pubg_p3", name: "Elite Pass LVL 1-50 🎫", price: 481, oldPrice: 0 }
                ],
                packs: [
                    { id: "pubg_pk1", name: "First Purchase Pack 📦", price: 80, oldPrice: 0 },
                    { id: "pubg_pk2", name: "Mythic Emblem Pack 🟥", price: 395, oldPrice: 0 },
                    { id: "pubg_pk3", name: "Upgradable Firearm Materials Pack 🔧", price: 237, oldPrice: 0 },
                    { id: "pubg_pk4", name: "Weekly Deal Pack 1 🧧", price: 80, oldPrice: 0 },
                    { id: "pubg_pk5", name: "Weekly Deal Pack 2 🧧", price: 241, oldPrice: 0 },
                    { id: "pubg_pk6", name: "Weekly Mythic Emblem Value Pack 💎", price: 241, oldPrice: 0 }
                ],
                prime: [
                    { id: "pubg_pr1", name: "Prime (1 месяц) 🎖️", price: 80, oldPrice: 0 },
                    { id: "pubg_pr2", name: "Prime (3 месяца) 🎖️", price: 237, oldPrice: 0 },
                    { id: "pubg_pr3", name: "Prime (6 месяцев) 🎖️", price: 474, oldPrice: 0 },
                    { id: "pubg_pr4", name: "Prime (12 месяцев) 🎖️", price: 949, oldPrice: 0 },
                    { id: "pubg_pr5", name: "Prime Plus (1 Month) 🔥", price: 799, oldPrice: 0 },
                    { id: "pubg_pr6", name: "Prime Plus (3 Months) 🔥", price: 2369, oldPrice: 0 },
                    { id: "pubg_pr7", name: "Prime Plus (6 Months) 🔥", price: 4739, oldPrice: 0 },
                    { id: "pubg_pr8", name: "Prime Plus (12 Months) 🔥", price: 9479, oldPrice: 0 }
                ]
            }
        };

        let db = JSON.parse(localStorage.getItem('gametopup_db')) || defaultProducts;
        
        let currentGame = 'ff';
        let currentCategory = 'diamonds';
        let selectedProductId = null;

        const categoriesData = {
            ff: [
                { id: 'diamonds', name: 'Алмазы 💎' },
                { id: 'vouchers', name: 'Ваучеры 🎫' }
            ],
            pubg: [
                { id: 'uc', name: 'UC 🪙' },
                { id: 'passes', name: 'Пропуски 🎫' },
                { id: 'packs', name: 'Наборы 📦' },
                { id: 'prime', name: 'Подписка Prime 👑' }
            ]
        };

        // Инициализация при загрузке страницы
        window.onload = function() {
            renderCategories();
            renderProducts();
        };

        function switchGame(game) {
            currentGame = game;
            currentCategory = categoriesData[game][0].id;
            selectedProductId = null;
            
            // Смена активных классов в табах игр
            const tabs = document.querySelectorAll('.game-tab');
            tabs[0].classList.toggle('active', game === 'ff');
            tabs[1].classList.toggle('active', game === 'pubg');

            // Изменение плейсхолдера под игру
            document.getElementById('id-label').innerText = game === 'ff' ? 'Введите Ваш UID (Free Fire):' : 'Введите Ваш ID (PUBG Mobile):';
            
            renderCategories();
            renderProducts();
        }

        function switchCategory(catId) {
            currentCategory = catId;
            selectedProductId = null;
            
            const catTabs = document.querySelectorAll('.category-tab');
            catTabs.forEach(tab => {
                tab.classList.toggle('active', tab.getAttribute('data-id') === catId);
            });

            renderProducts();
        }

        function renderCategories() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';
            
            categoriesData[currentGame].forEach(cat => {
                const tab = document.createElement('div');
                tab.className = `category-tab ${cat.id === currentCategory ? 'active' : ''}`;
                tab.innerText = cat.name;
                tab.setAttribute('data-id', cat.id);
                tab.onclick = () => switchCategory(cat.id);
                container.appendChild(tab);
            });
        }

        function renderProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            const items = db[currentGame][currentCategory] || [];

            if (items.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:var(--text-muted)">Товары не найдены</p>';
                return;
            }

            items.forEach((prod, index) => {
                // По умолчанию выбираем первый товар в категории, если ничего не выбрано
                if (selectedProductId === null && index === 0) {
                    selectedProductId = prod.id;
                }

                const card = document.createElement('div');
                card.className = `product-card ${prod.id === selectedProductId ? 'selected' : ''}`;
                card.onclick = () => selectProduct(prod.id);

                let oldPriceHTML = prod.oldPrice > 0 ? `<span class="price-old">${prod.oldPrice} ₽</span>` : '';

                card.innerHTML = `
                    <div class="product-info">
                        <div class="product-title">${prod.name}</div>
                        <div class="product-prices">
                            <span class="price-current">${prod.price} ₽</span>
                            ${oldPriceHTML}
                        </div>
                    </div>
                    <div class="radio-circle"></div>
                `;
                container.appendChild(card);
            });
        }

        function selectProduct(id) {
            selectedProductId = id;
            const cards = document.querySelectorAll('.product-card');
            
            // Быстрое обновление классов без полного рендеринга
            renderProducts();
        }

        // Логика формирования ссылки для оформления покупки
        function processOrder() {
            const uidInput = document.getElementById('uid').value.trim();
            if (!uidInput) {
                alert('Пожалуйста, введите ваш ID / UID игрока перед покупкой!');
                return;
            }

            // Ищем выбранный товар в БД
            let foundProduct = null;
            const items = db[currentGame][currentCategory] || [];
            items.forEach(p => {
                if (p.id === selectedProductId) foundProduct = p;
            });

            if (!foundProduct) {
                alert('Пожалуйста, выберите нужный товар!');
                return;
            }

            const gameName = currentGame === 'ff' ? 'Free Fire' : 'PUBG Mobile';
            
            // Формируем текст сообщения для отправки в ТГ
            const messageText = `Привет! Хочу купить товар в магазине GameTopUp.%0A%0A🎮 Игра: ${gameName}%0A🆔 Мой ID/UID: ${uidInput}%0A📦 Товар: ${foundProduct.name}%0A💰 К оплате: ${foundProduct.price} ₽`;
            
            // Ссылка на ТГ бота со стартовым параметром сообщения
            const tgBotUrl = `https://t.me/GameTopUp11_bot?text=${messageText}`;
            
            // Открываем бота в новой вкладке/приложении Telegram
            window.open(tgBotUrl, '_blank');
        }

        /* --- Раздел Администратора --- */
        function openAdmin() {
            const password = prompt("Введите пароль администратора для изменения цен:");
            if (password === "admin123") { // Ваш дефолтный пароль
                buildAdminPanel();
                document.getElementById('admin-modal').style.display = 'block';
            } else if (password !== null) {
                alert("Неверный пароль!");
            }
        }

        function closeAdmin() {
            document.getElementById('admin-modal').style.display = 'none';
        }

        function buildAdminPanel() {
            const container = document.getElementById('admin-items-list');
            container.innerHTML = '';

            // Перебираем все игры, категории и товары для создания инпутов
            for (let gameKey in db) {
                let gameLabel = gameKey === 'ff' ? 'FREE FIRE' : 'PUBG';
                
                for (let catKey in db[gameKey]) {
                    let catLabel = categoriesData[gameKey].find(c => c.id === catKey)?.name || catKey;
                    
                    db[gameKey][catKey].forEach(prod => {
                        const itemRow = document.createElement('div');
                        itemRow.className = 'admin-item-row';
                        itemRow.innerHTML = `
                            <div class="admin-item-title">[${gameLabel} -> ${catLabel}] ${prod.name}</div>
                            <div class="admin-inputs">
                                <div class="admin-input-group">
                                    <label>Цена (₽)</label>
                                    <input type="number" class="admin-field price-input" data-game="${gameKey}" data-cat="${catKey}" data-id="${prod.id}" value="${prod.price}">
                                </div>
                                <div class="admin-input-group">
                                    <label>Старая цена (0 - убрать)</label>
                                    <input type="number" class="admin-field oldprice-input" data-game="${gameKey}" data-cat="${catKey}" data-id="${prod.id}" value="${prod.oldPrice}">
                                </div>
                            </div>
                        `;
                        container.appendChild(itemRow);
                    });
                }
            }
        }

        function saveAdminPrices() {
            // Собираем новые значения текущих цен
            const priceInputs = document.querySelectorAll('.price-input');
            priceInputs.forEach(input => {
                const game = input.getAttribute('data-game');
                const cat = input.getAttribute('data-cat');
                const id = input.getAttribute('data-id');
                const newVal = parseInt(input.value) || 0;

                let item = db[game][cat].find(p => p.id === id);
                if (item) item.price = newVal;
            });

            // Собираем новые значения старых цен
            const oldPriceInputs = document.querySelectorAll('.oldprice-input');
            oldPriceInputs.forEach(input => {
                const game = input.getAttribute('data-game');
                const cat = input.getAttribute('data-cat');
                const id = input.getAttribute('data-id');
                const newVal = parseInt(input.value) || 0;

                let item = db[game][cat].find(p => p.id === id);
                if (item) item.oldPrice = newVal;
            });

            // Запись обновленной базы в localStorage
            localStorage.setItem('gametopup_db', JSON.stringify(db));
            
            alert('Все изменения успешно сохранены!');
            closeAdmin();
            renderProducts(); // Перерисовываем товары
        }
    </script>
</body>
</html>
